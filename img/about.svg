<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="goldg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- Background card -->
  <rect x="30" y="30" width="540" height="440" rx="4" fill="url(#navy)"/>
  <!-- Gold accent bar -->
  <rect x="30" y="30" width="4" height="440" fill="url(#goldg)"/>
  <!-- Large diamond centerpiece -->
  <polygon points="300,100 420,250 300,400 180,250" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="300,140 380,250 300,360 220,250" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="300,180 340,250 300,320 260,250" fill="#c9a84c" fill-opacity="0.15"/>
  <!-- Dubai skyline silhouette -->
  <g fill="#c9a84c" fill-opacity="0.12">
    <rect x="80" y="350" width="20" height="60"/>
    <rect x="110" y="330" width="15" height="80"/>
    <rect x="135" y="300" width="25" height="110"/>
    <rect x="170" y="340" width="18" height="70"/>
    <rect x="400" y="310" width="25" height="100"/>
    <rect x="435" y="330" width="18" height="80"/>
    <rect x="463" y="290" width="30" height="120"/>
    <rect x="503" y="345" width="15" height="65"/>
  </g>
  <!-- Corner accents -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="60" y1="60" x2="60" y2="120" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="540" y1="440" x2="480" y2="440" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="540" y1="440" x2="540" y2="380" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
</svg>
